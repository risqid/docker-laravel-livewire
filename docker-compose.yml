services:
  # The PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: laravel_php
    ports:
      - "5173:5173"
    environment:
      - 'COMPOSER_AUTH={"github-oauth": {"github.com": "${GITHUB_TOKEN}"}}'
    volumes:
      - ./src:/var/www
    networks:
      - laravel_network

  # The Nginx Web Server
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
    depends_on:
      - app
    networks:
      - laravel_network

  # The MySQL Database
  db:
    image: mysql:8.4
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge

volumes:
  db_data: